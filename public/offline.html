<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Magic Collection</title>
  <style>
    html,body{margin:0;height:100%;background:#0f0f12;color:#f4f4f5;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .wrap{max-width:320px}
    h1{font-size:20px;margin:0 0 8px}
    p{color:#a1a1aa;font-size:14px;line-height:1.5;margin:0 0 20px}
    button{background:#6366f1;color:#fff;border:none;border-radius:10px;
      padding:11px 18px;font-size:14px;font-weight:600}
  </style>
</head>
<body>
  <div class="wrap">
    <div style="font-size:40px;margin-bottom:10px">🪄</div>
    <h1>Keine Verbindung</h1>
    <p>Magic Collection braucht eine Internetverbindung, um deine Karten und aktuellen Preise zu laden. Sobald du wieder online bist, geht es weiter.</p>
    <button onclick="location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
